# Wurzel-Manifest von alc-ai — die KI-Reihe.
#
# Adaptive-Learner-Content-Repo für KI. Zwei deutschsprachige Sets
# (domain: ai) nach aufsteigendem Niveau:
#
#   ki-einsteiger    KI für Einsteiger    (A1, 12 Lektionen)
#   data-science-ki  Data Science und KI  (A2,  9 Lektionen)
#
# Vormals in astrapi69/adaptive-learner-content; in dieses eigenständige
# Content-Repo ausgelagert (siehe adaptive-learner-content#144).
# Validieren mit:
#
#     python3 scripts/validate_content.py
#     node scripts/validate_with_engine.mjs .
#
# Anleitung: docs/GETTING-STARTED.md
schema_version: '1.5'
name: Adaptive Learner — KI
description: >-
  KI-Inhalte für Adaptive Learner: der Begleitkurs zum Buch „KI für
  Einsteiger" und der Aufbaukurs „Data Science und KI", beide auf
  Deutsch erklärt.
sets:
  - id: ki-einsteiger-from-de
    title: KI für Einsteiger
    title_native: KI für Einsteiger
    target_language: de
    source_language: de
    domain: ai
    level: A1
    path: sets/de/ki-einsteiger
    version: '1.0.0'
    lesson_count: 12
    description: >-
      Begleitkurs zum Buch „KI für Einsteiger" von Asterios
      Raptis (12 Lektionen): KI im Alltag und Grundbegriffe,
      Prompt-Engineering (Grundlagen und Prompt-Typen), KI für
      Projekte, Lernen, Kreativität, Produktivität und Teamarbeit
      sowie ein Tool-Überblick und KI-Ethik. Erklärt auf Deutsch,
      mit eigenständigem Lerninhalt. Erstes KI-Set (domain: ai).
    tags:
      - beginner
      - ai
      - prompt-engineering
    book:
      title: "KI für Einsteiger"
      author: "Asterios Raptis"
      asin: "B0F43H6T2M"
      url: "https://www.amazon.de/dp/B0F43H6T2M"
  - id: data-science-ki-from-de
    title: Data Science und KI
    title_native: Data Science und KI
    target_language: de
    source_language: de
    domain: ai
    level: A2
    path: sets/de/data-science-ki
    version: '1.0.0'
    lesson_count: 9
    description: >-
      Aufbaukurs im Anschluss an „KI für Einsteiger" (9 Lektionen):
      Was Data Science ist, Daten verstehen, Statistik für den Alltag,
      Grundkonzepte des maschinellen Lernens, Modelle bewerten,
      neuronale Netze und Deep Learning, Sprachmodelle und generative
      KI, KI im Einsatz sowie Verantwortung. Erklärt auf Deutsch,
      konzeptuell und ohne Programmieren. KI-Set (domain: ai).
    tags:
      - aufbau
      - ai
      - data-science
      - machine-learning
