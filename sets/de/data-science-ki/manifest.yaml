# Data Science und KI (für Deutschsprachige) — Set-Manifest
# (schema v1.4, domain: ai).
#
# Aufbau-Fortsetzung des Einsteiger-Kurses „KI für Einsteiger":
# eine Stufe darüber (Aufbau/A2), konzeptuell und ohne
# Code-Schreiben. ``domain: ai`` markiert den Inhalt als
# Sachthema: Material und Erklärung sind beide auf Deutsch
# (source_language == target_language), und der Set-Ordner trägt
# einen Themennamen (``data-science-ki``) statt eines
# ``{target}-{level}``-Namens. Der Content-Loader liest
# ``metadata.lessons`` für die Dateiliste.
#
# Hinweis: kein ``book:``-Block — anders als das Einsteiger-Set
# ist dieser Aufbaukurs kein Begleitkurs zu einem konkreten Buch;
# er setzt inhaltlich auf „KI für Einsteiger" auf. (Ein Buchbezug
# ließe sich später ergänzen, sobald ein passender Titel vorliegt.)
schema_version: '1.4'
name: Data Science und KI
description: >-
  Aufbaukurs im Anschluss an „KI für Einsteiger": Data Science und
  maschinelles Lernen verständlich erklärt — von Daten und Statistik
  über Machine Learning, Modellbewertung und neuronale Netze bis zu
  Sprachmodellen, Anwendungen und Verantwortung. Auf Deutsch,
  konzeptuell und ohne Programmieren.
sets:
